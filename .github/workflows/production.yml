name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: false
        default: ''
      notes:
        description: 'Deployment notes'
        required: false
        default: ''

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.deploy-production.outputs.production-url }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Deploy to Production
        id: deploy-production
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Production URL: $DEPLOY_URL"
          echo "PRODUCTION_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "production-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          
      - name: Create Deployment Record
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          NOTES="${{ github.event.inputs.notes }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "Creating deployment record for version $VERSION"
          echo "Timestamp: $TIMESTAMP"
          echo "Deployment notes: $NOTES"
          
          # Here you could add code to store deployment records in a database or create a release on GitHub 