name: 🔗 Weekly Broken Link Report

on:
  schedule:
    - cron: '0 12 * * 1'  # every Monday at 12PM UTC
  workflow_dispatch:

jobs:
  scan-broken-links:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 🔩 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Or your project's node version

      - name: 📦 Install Node dependencies
        run: npm install

      - name: 🔎 Install Lychee
        run: cargo install lychee

      - name: 🔍 Scan for broken links & Validate Output
        run: |
          lychee ./app/**/*.tsx --verbose --format json --no-progress --ignore-file .lycheeignore > broken-links.json || echo "Lychee command finished (may have found errors)."
          # Validate JSON output and replace with empty array if invalid/empty
          if ! jq empty broken-links.json 2>/dev/null; then
            echo "broken-links.json is invalid or empty. Replacing with an empty JSON array."
            echo "[]" > broken-links.json
          fi
          echo "--- broken-links.json content after validation ---"
          cat broken-links.json
          echo "--- end content ---"
        continue-on-error: true

      - name: 📥 Save to Supabase
        run: node scripts/saveToSupabase.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 📨 Generate email summary
        run: node scripts/generateEmail.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 📬 Send email with results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SMTP_HOST }}
          server_port: ${{ secrets.EMAIL_SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🔗 Cybernex Weekly Broken Link Report"
          to: cybernexacademy@proton.me
          from: Cybernex Bot <${{ secrets.EMAIL_USERNAME }}>
          body: |
            $(cat email-output.txt) 