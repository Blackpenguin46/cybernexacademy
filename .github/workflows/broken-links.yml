name: Check Broken Links

on:
  schedule:
    - cron: '0 2 * * 0' # weekly on Sunday at 2am
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Step to install Rust/Cargo if not pre-installed on runner
      # Usually ubuntu-latest has it, but this ensures it
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Install lychee via cargo
        run: cargo install lychee

      - name: Run link checker
        run: |
          # Ensure the lychee binary path is available
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          lychee --verbose --retry 2 --timeout 20 --max-concurrency 4 \
            --user-agent "Mozilla/5.0 (compatible; LycheeBot/1.0; +https://github.com/lycheeverse/lychee)" \
            --output broken-links.json \
            --exclude "https://cybernexacademy.substack.com" \
            --format json \
            ./app/**/*.tsx || echo "Lychee finished with some errors, check broken-links.json"
        continue-on-error: true # Continue even if lychee finds broken links

      - name: Check if broken-links.json exists and has content
        id: check_file
        run: |
          if [[ -f broken-links.json && -s broken-links.json ]]; then
            echo "File exists and is not empty."
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "File does not exist or is empty."
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Supabase
        if: steps.check_file.outputs.file_exists == 'true'
        run: |
          # Ensure curl is installed
          sudo apt-get update && sudo apt-get install -y curl
          # Replace <your-project> with your actual Supabase project ID/ref
          curl -X POST https://<your-project-ref>.supabase.co/functions/v1/log-broken-links \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            --data-binary "@broken-links.json"

      - name: Setup Node.js for email script
        if: steps.check_file.outputs.file_exists == 'true' # Only setup if file exists
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Or your preferred Node version

      - name: Install email dependencies
        if: steps.check_file.outputs.file_exists == 'true' # Only install if needed
        run: npm install nodemailer fs-extra # Use fs-extra for potential future needs
        working-directory: .github/scripts # Assuming script is in this folder

      - name: Send email report
        if: steps.check_file.outputs.file_exists == 'true' # Only send if file exists
        run: node .github/scripts/sendBrokenLinksEmail.js
        env:
          PROTON_SMTP_PASS: ${{ secrets.PROTON_SMTP_PASS }} 